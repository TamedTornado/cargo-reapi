name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]

# Hosted CI is opportunistic portability validation only. It does not publish,
# deploy, merge, or constitute cargo-reapi/Moria acceptance. The real Bevy and
# Moria integration proofs require the local executable contract and are not run
# on GitHub-hosted machines.

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo check --all-targets
      - run: cargo clippy --all-targets -- -D warnings
      # GitHub-hosted Linux runners prohibit the network namespace setup used
      # by the strict sandbox integration suite. Compile and lint every target
      # here, then run all binary unit tests and the portable shell-contract
      # integration test. The complete all-target suite remains a local gate.
      - run: cargo test --bins --test resource_harness

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.88
      - run: cargo check --all-targets --locked

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo package --locked
