name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]

# Hosted CI is opportunistic portability validation only. It does not publish,
# deploy, merge, or constitute cargo-reapi/Moria acceptance. The real Bevy and
# Moria integration proofs require the local executable contract and are not run
# on GitHub-hosted machines.

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test --bin cargo-reapi
